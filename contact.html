<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의하기 | 렌탈비교계산기</title>
  <meta name="description" content="가전 렌탈 견적 비교 서비스 렌탈비교계산기에 문의하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F3EE; --card: #FFFFFF; --primary: #1A1A2E;
      --accent: #E63946; --accent2: #457B9D; --muted: #8A8A8A;
      --border: #E8E5DF; --success: #2D6A4F;
      --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--primary); }
    .gnb { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .gnb-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; }
    .gnb-logo { font-size: 16px; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -0.5px; }
    .gnb-logo span { color: var(--accent); }
    .gnb-menu { display: flex; align-items: center; gap: 4px; }
    .gnb-item { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 8px; transition: all .15s; cursor: pointer; }
    .gnb-item:hover, .gnb-item.active { color: var(--primary); }
    .gnb-dropdown { position: relative; }
    .gnb-dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; min-width: 160px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .gnb-dropdown:hover .gnb-dropdown-menu { display: block; }
    .gnb-dropdown-item { display: block; padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--primary); text-decoration: none; transition: background .15s; border-bottom: 1px solid var(--border); }
    .gnb-dropdown-item:last-child { border-bottom: none; }
    .gnb-dropdown-item:hover { background: var(--bg); }
    .gnb-dropdown-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; padding: 10px 16px 4px; text-transform: uppercase; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 32px 16px 60px; }
    .page-header { margin-bottom: 32px; }
    .page-eyebrow { font-size: 11px; font-weight: 700; color: var(--accent2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 8px; }
    .page-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .field input, .field select, .field textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--primary); outline: none; transition: border-color .2s; -webkit-appearance: none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent2); background: #fff; }
    .field input::placeholder, .field textarea::placeholder { color: #C0BDB8; }
    .field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; margin-top: 8px; transition: transform .1s; }
    .btn-submit:active { transform: scale(0.98); }
    .notice { background: #EBF3FA; border: 1px solid #B5D4F4; border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; }
    .notice-text { font-size: 13px; color: var(--accent2); line-height: 1.6; }
    .notice-text strong { font-weight: 700; }
    .success-box { display: none; text-align: center; padding: 48px 24px; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .btn-back { display: inline-block; padding: 12px 24px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; font-weight: 600; text-decoration: none; color: var(--primary); }
  </style>
</head>
<body>
<header class="gnb">
  <div class="gnb-inner">
    <a href="index.html" class="gnb-logo">렌탈<span>비교계산기</span></a>
    <nav class="gnb-menu">
      <div class="gnb-dropdown">
        <span class="gnb-item">견적 비교하기 ▾</span>
        <div class="gnb-dropdown-menu">
          <div class="gnb-dropdown-label">제품 유형 선택</div>
          <a href="calculator.html" class="gnb-dropdown-item">단일 제품 계산</a>
          <a href="compare.html" class="gnb-dropdown-item">여러 제품 결합 비교</a>
        </div>
      </div>
      <a href="faq.html" class="gnb-item">FAQ</a>
      <a href="contact.html" class="gnb-item active">문의</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="page-header">
    <div class="page-eyebrow">Contact</div>
    <h1 class="page-title">문의하기</h1>
    <p class="page-sub">궁금한 점이나 개선 의견을 남겨주세요.<br>빠르게 답변드릴게요.</p>
  </div>

  <div class="notice">
    <div class="notice-text">
      💡 <strong>렌탈 견적 상담은 각 브랜드 고객센터로 문의해주세요.</strong><br>
      이 서비스는 견적 계산 도구로, 렌탈 계약 상담은 제공하지 않아요.
    </div>
  </div>

  <div class="form-card" id="form-section">
    <!-- Formspree 연동 시 action="https://formspree.io/f/YOUR_FORM_ID" method="POST" 추가 -->
    <form id="contact-form" onsubmit="handleSubmit(event)">
      <div class="field">
        <label>문의 유형</label>
        <select name="type" required>
          <option value="">문의 유형을 선택해주세요</option>
          <option value="bug">계산 오류 / 버그 신고</option>
          <option value="feature">기능 개선 / 추가 요청</option>
          <option value="content">콘텐츠 오류 신고</option>
          <option value="partnership">제휴 / 광고 문의</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="field">
        <label>이름</label>
        <input type="text" name="name" placeholder="이름을 입력해주세요" required />
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" name="email" placeholder="답변받을 이메일 주소" required />
        <div class="field-hint">입력하신 이메일로 답변을 드려요.</div>
      </div>
      <div class="field">
        <label>문의 내용</label>
        <textarea name="message" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
      </div>
      <button type="submit" class="btn-submit">문의 보내기 →</button>
    </form>
  </div>

  <div class="success-box" id="success-section">
    <div class="success-icon">✅</div>
    <div class="success-title">문의가 접수됐어요</div>
    <div class="success-sub">빠른 시일 내에 이메일로 답변드릴게요.<br>감사합니다.</div>
    <a href="index.html" class="btn-back">홈으로 돌아가기</a>
  </div>
</div>

<script>
function handleSubmit(e) {
  e.preventDefault();
  // Formspree 연동 전 임시 처리
  // 연동 후에는 form에 action/method 추가하고 이 함수 제거
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('success-section').style.display = 'block';
}
</script>
</body>
</html>
